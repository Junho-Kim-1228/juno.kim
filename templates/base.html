{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}김준호{% endblock %}</title>
  <meta
    name="description"
    content="{% block meta_description %}김준호의 Django 기반 개인 웹사이트{% endblock %}"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{% static 'css/site.css' %}" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="/">김준호</a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="#about">소개</a>
        <a href="#comments">댓글</a>
        <a href="#stack">스택</a>
      </nav>
    </header>

    {% if messages %}
      <div class="flash-stack">
        {% for message in messages %}
          <div class="flash flash-{{ message.tags|default:'info' }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
